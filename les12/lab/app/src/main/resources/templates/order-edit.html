<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование заказа — Магазин зоотоваров</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h2 class="mb-4">🐾 Редактирование заказа #<span th:text="${order.orderId}">1</span></h2>

    <form th:action="@{/orders/{id}/edit(id=${order.orderId})}" method="post" class="card p-4">

        <div class="mb-3">
            <label for="customerId" class="form-label">Клиент:</label>
            <select name="customerId" id="customerId" class="form-select" required>
                <option th:each="c : ${customers}" th:value="${c.customerId}"
                        th:selected="${c.customerId == order.customer.customerId}"
                        th:text="${c.name + ' (' + c.email + ')'}">Клиент</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="status" class="form-label">Статус:</label>
            <select name="status" id="status" class="form-select" required>
                <option th:value="'NEW'" th:selected="${order.status == 'NEW'}">NEW</option>
                <option th:value="'PROCESSING'" th:selected="${order.status == 'PROCESSING'}">PROCESSING</option>
                <option th:value="'SHIPPED'" th:selected="${order.status == 'SHIPPED'}">SHIPPED</option>
                <option th:value="'DELIVERED'" th:selected="${order.status == 'DELIVERED'}">DELIVERED</option>
                <option th:value="'CANCELLED'" th:selected="${order.status == 'CANCELLED'}">CANCELLED</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="shippingAddress" class="form-label">Адрес доставки:</label>
            <input type="text" name="shippingAddress" id="shippingAddress" class="form-control"
                   th:value="${order.shippingAddress}" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Товары:</label>
            <div id="products">
                <!-- Существующие позиции -->
                <div th:each="d : ${order.orderDetails}" class="row mb-2 product-row">
                    <div class="col-8">
                        <select name="productId" class="form-select" required>
                            <option value="">-- Товар --</option>
                            <option th:each="p : ${products}" th:value="${p.productId}"
                                    th:selected="${p.productId == d.product.productId}"
                                    th:text="${p.name + ' — ' + p.price + ' руб.'}">Товар</option>
                        </select>
                    </div>
                    <div class="col-4">
                        <input type="number" name="quantity" min="1" th:value="${d.quantity}" class="form-control" required>
                    </div>
                </div>
                <!-- Пустая строка, если у заказа нет позиций -->
                <div th:if="${#lists.isEmpty(order.orderDetails)}" class="row mb-2 product-row">
                    <div class="col-8">
                        <select name="productId" class="form-select" required>
                            <option value="">-- Товар --</option>
                            <option th:each="p : ${products}" th:value="${p.productId}"
                                    th:text="${p.name + ' — ' + p.price + ' руб.'}">Товар</option>
                        </select>
                    </div>
                    <div class="col-4">
                        <input type="number" name="quantity" min="1" value="1" class="form-control" required>
                    </div>
                </div>
            </div>
            <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addProductRow()">+ Добавить товар</button>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-warning">Сохранить изменения</button>
            <a th:href="@{/orders}" class="btn btn-secondary ms-2">Отмена</a>
        </div>
    </form>

    <script>
        function addProductRow() {
            var container = document.getElementById('products');
            var firstRow = container.querySelector('.product-row');
            var newRow = firstRow.cloneNode(true);
            newRow.querySelector('select').value = '';
            newRow.querySelector('input').value = '1';
            container.appendChild(newRow);
        }
    </script>

</body>
</html>
