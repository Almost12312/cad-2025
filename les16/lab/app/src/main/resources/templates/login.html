<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Вход — Магазин зоотоваров</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background-color:#f8f9fa}.login-container{max-width:400px;margin:100px auto;padding:30px;background:white;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.1)}</style>
</head><body>
<div class="login-container">
<h2 class="text-center mb-4">🐾 Вход в систему</h2>
<div th:if="${param.error}" class="alert alert-danger">Неверный логин или пароль</div>
<div th:if="${param.logout}" class="alert alert-success">Вы вышли из системы</div>
<form th:action="@{/login}" method="post">
<div class="mb-3"><label for="username" class="form-label">Логин:</label><input type="text" id="username" name="username" class="form-control" required autofocus/></div>
<div class="mb-3"><label for="password" class="form-label">Пароль:</label><input type="password" id="password" name="password" class="form-control" required/></div>
<button type="submit" class="btn btn-primary w-100">Войти</button>
</form>
<div class="mt-3 text-muted text-center" style="font-size:.85rem"><p class="mb-1"><strong>user</strong>/1234 — просмотр</p><p class="mb-0"><strong>manager</strong>/1234 — все операции</p></div>
</div></body></html>
