<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Заказы — Магазин зоотоваров</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🐾 Магазин зоотоваров — Заказы</h2>
        <div>
            <span class="me-3">Пользователь: <strong th:text="${username}">user</strong></span>
            <a th:href="@{/logout}" class="btn btn-outline-secondary btn-sm">Выйти</a>
        </div>
    </div>

    <a th:if="${isManager}" th:href="@{/orders/new}" class="btn btn-success mb-3">➕ Создать новый заказ</a>

    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">
        Заказов пока нет.
    </div>

    <table th:unless="${#lists.isEmpty(orders)}" class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>№</th>
                <th>Клиент</th>
                <th>Дата</th>
                <th>Статус</th>
                <th>Итого (руб.)</th>
                <th>Адрес доставки</th>
                <th>Позиции</th>
                <th th:if="${isManager}">Действия</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.orderId}">1</td>
                <td th:text="${order.customer.name}">Имя</td>
                <td th:text="${#temporals.format(order.orderDate, 'dd.MM.yyyy HH:mm')}">01.01.2025</td>
                <td th:text="${order.status}">NEW</td>
                <td th:text="${order.totalPrice}">0.00</td>
                <td th:text="${order.shippingAddress}">Адрес</td>
                <td>
                    <small th:each="d : ${order.orderDetails}">
                        <span th:text="${d.product.name}">Товар</span>
                        x <span th:text="${d.quantity}">1</span>
                        (<span th:text="${d.price}">0</span> руб.)<br/>
                    </small>
                </td>
                <td th:if="${isManager}">
                    <a th:href="@{/orders/{id}/edit(id=${order.orderId})}" class="btn btn-sm btn-warning">✏️</a>
                    <form th:action="@{/orders/{id}/delete(id=${order.orderId})}" method="post" style="display:inline;">
                        <button type="submit" class="btn btn-sm btn-danger"
                                onclick="return confirm('Удалить заказ?')">🗑️</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</body>
</html>
