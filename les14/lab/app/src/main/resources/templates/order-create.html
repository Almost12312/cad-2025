<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создание заказа — Магазин зоотоваров</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h2 class="mb-4">🐾 Создание нового заказа</h2>

    <form th:action="@{/orders}" method="post" class="card p-4">

        <div class="mb-3">
            <label for="customerId" class="form-label">Клиент:</label>
            <select name="customerId" id="customerId" class="form-select" required>
                <option value="">-- Выберите клиента --</option>
                <option th:each="c : ${customers}" th:value="${c.customerId}"
                        th:text="${c.name + ' (' + c.email + ')'}">Клиент</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Товары:</label>
            <div id="products">
                <div class="row mb-2 product-row">
                    <div class="col-8">
                        <select name="productId" class="form-select" required>
                            <option value="">-- Товар --</option>
                            <option th:each="p : ${products}" th:value="${p.productId}"
                                    th:text="${p.name + ' — ' + p.price + ' руб. (остаток: ' + p.stockQuantity + ')'}">Товар</option>
                        </select>
                    </div>
                    <div class="col-4">
                        <input type="number" name="quantity" min="1" value="1" class="form-control" required placeholder="Кол-во">
                    </div>
                </div>
            </div>
            <button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addProductRow()">+ Добавить товар</button>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-success">Создать заказ</button>
            <a th:href="@{/orders}" class="btn btn-secondary ms-2">Назад к списку</a>
        </div>
    </form>

    <script>
        function addProductRow() {
            var container = document.getElementById('products');
            var firstRow = container.querySelector('.product-row');
            var newRow = firstRow.cloneNode(true);
            newRow.querySelector('select').value = '';
            newRow.querySelector('input').value = '1';
            container.appendChild(newRow);
        }
    </script>

</body>
</html>
